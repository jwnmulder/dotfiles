repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
        exclude: ".*\\.tmpl"
      - id: check-json
      - id: check-yaml
        files: .*\.(yaml|yml)$
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: trailing-whitespace

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        exclude: "^.*\\.(zsh|tmpl)$"

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        args:
          - --strict

  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.1.2
    hooks:
      - id: betterleaks

  - repo: local
    hooks:
      - id: psscriptanalyzer
        name: PSScriptAnalyzer
        description: |
          PSScriptAnalyzer provides script analysis and checks for potential code defects in the scripts
          by applying a group of built-in or customized rules on the scripts being analyzed
        language: python
        files: '.*\.(ps1|ps1\.tmpl)$'
        entry: >-
          bin/Invoke-ScriptAnalyzer.py -Path . -Recurse -EnableExit
          -ExcludeRule PSAvoidUsingInvokeExpression
        pass_filenames: false
